<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Câmara 360 | Gestão Legislativa Acessível</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    :focus-visible { outline: 3px solid #1d4ed8; outline-offset: 2px; }
    .view-section { display: none; }
    .view-section.active { display: block; }
    .active-link { background: #eff6ff; color: #1d4ed8; border-right: 4px solid #1d4ed8; font-weight: 700; }
    .star-active { fill: #eab308; stroke: #eab308; }
    .video-monitor { aspect-ratio: 16/9; background:#0f172a; border-radius:.75rem; border:4px solid #1e293b; position:relative; overflow:hidden; }
    .video-monitor::before {
      content:""; position:absolute; inset:0; pointer-events:none;
      background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,.1) 50%), linear-gradient(90deg, rgba(255,0,0,.03), rgba(0,255,0,.01), rgba(0,0,255,.03));
      background-size: 100% 2px, 3px 100%;
    }
    .live-indicator { animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="announcer" class="sr-only" aria-live="polite"></div>

  <div class="flex min-h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col" role="navigation" aria-label="Menu Principal">
      <div class="p-6">
        <div class="flex items-center gap-3 text-blue-700 mb-8">
          <div class="bg-blue-700 p-2 rounded-lg" aria-hidden="true"><i data-lucide="layout-dashboard" class="text-white w-6 h-6"></i></div>
          <span class="font-bold text-xl tracking-tight">Câmara 360</span>
        </div>

        <nav class="space-y-1" id="leftNav">
          <button data-view="dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg transition-colors active-link"><i data-lucide="home" class="w-4 h-4"></i> Visão Geral</button>
          <button data-view="live" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg text-slate-600 hover:bg-slate-50"><i data-lucide="tv" class="w-4 h-4"></i> Monitor Digital</button>
          <button data-view="deputies" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg text-slate-600 hover:bg-slate-50"><i data-lucide="users" class="w-4 h-4"></i> Deputados</button>
          <button data-view="committees" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg text-slate-600 hover:bg-slate-50"><i data-lucide="landmark" class="w-4 h-4"></i> Comissões</button>
          <button data-view="projects" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg text-slate-600 hover:bg-slate-50"><i data-lucide="file-text" class="w-4 h-4"></i> Projetos (PL)</button>
          <button data-view="agenda" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg text-slate-600 hover:bg-slate-50"><i data-lucide="calendar" class="w-4 h-4"></i> Agenda</button>
        </nav>
      </div>

      <div class="mt-auto p-6 border-t border-slate-100">
        <div class="bg-slate-50 rounded-xl p-4" role="status">
          <div class="flex items-center gap-2">
            <div id="api-status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
            <span id="api-status-text" class="text-xs text-slate-700 font-medium">Iniciando...</span>
          </div>
        </div>
      </div>
    </aside>

    <main id="main-content" class="flex-1 flex flex-col h-screen overflow-y-auto relative" tabindex="-1">
      <header class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-30 px-6 py-4 flex justify-between items-center">
        <div>
          <h1 id="view-title" class="text-lg font-bold text-slate-800 uppercase tracking-tight">Visão Geral</h1>
          <p class="text-xs text-slate-500">Sincronizado: <span id="last-update">--:--</span></p>
        </div>
        <div class="flex items-center gap-3">
          <select id="refresh-interval" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm">
            <option value="0">Manual</option>
            <option value="60" selected>1 min</option>
            <option value="300">5 min</option>
          </select>
          <button id="refresh-btn" class="bg-blue-700 hover:bg-blue-800 text-white p-2 rounded-lg shadow-sm flex items-center gap-2 px-4 text-sm font-semibold"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Atualizar</button>
        </div>
      </header>

      <div class="p-6">
        <section id="view-dashboard" class="view-section active space-y-6">
          <div id="kpis-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
              <h3 class="font-bold text-slate-800 mb-5 text-sm uppercase tracking-widest">Distribuição Partidária</h3>
              <div class="h-64"><canvas id="partyChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
              <h3 class="font-bold text-slate-800 mb-4 text-sm uppercase tracking-widest">Órgãos em Atividade</h3>
              <div id="active-committees" class="space-y-3"></div>
            </div>
          </div>
        </section>

        <section id="view-live" class="view-section space-y-6">
          <div class="bg-slate-900 p-4 rounded-xl text-white flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span class="flex h-3 w-3 relative"><span class="live-indicator absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>
              <span class="font-bold text-sm uppercase tracking-widest">Sessões em Transmissão</span>
            </div>
            <p class="text-xs text-slate-400">Atalho para streams oficiais da Câmara</p>
          </div>
          <div id="live-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </section>

        <section id="view-deputies" class="view-section space-y-4">
          <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              <div class="space-y-1">
                <label for="deputy-search" class="text-[10px] font-bold text-slate-500 uppercase">Nome do Parlamentar</label>
                <input type="text" id="deputy-search" placeholder="Ex: Maria..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
              </div>
              <div class="space-y-1">
                <label for="deputy-party-filter" class="text-[10px] font-bold text-slate-500 uppercase">Partido</label>
                <select id="deputy-party-filter" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"><option value="">Todos</option></select>
              </div>
              <div class="space-y-1">
                <label for="deputy-uf-filter" class="text-[10px] font-bold text-slate-500 uppercase">UF</label>
                <select id="deputy-uf-filter" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"><option value="">Todas</option></select>
              </div>
              <div class="space-y-1">
                <label for="deputy-sex-filter" class="text-[10px] font-bold text-slate-500 uppercase">Sexo</label>
                <select id="deputy-sex-filter" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"><option value="">Todos</option><option value="M">Masculino</option><option value="F">Feminino</option></select>
              </div>
            </div>
          </div>
          <div id="deputies-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </section>

        <section id="view-committees" class="view-section space-y-4">
          <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <input type="text" id="committee-search" placeholder="Buscar comissão..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
              <select id="committee-type-filter" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"><option value="">Todos os tipos</option></select>
            </div>
          </div>
          <div id="committees-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="view-projects" class="view-section space-y-6">
          <div id="tracked-projects-section" class="hidden space-y-4">
            <div class="flex items-center gap-2 text-blue-700"><i data-lucide="star" class="w-5 h-5 fill-yellow-400 stroke-yellow-400"></i><h2 class="font-bold text-sm uppercase tracking-wider">Monitoramento Prioritário</h2></div>
            <div id="tracked-projects-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
          </div>
          <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <input type="text" id="project-search" placeholder="Número ou tema" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
              <select id="project-year-filter" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"><option value="">Todos os anos</option></select>
            </div>
          </div>
          <div class="bg-white border border-slate-200 rounded-2xl overflow-x-auto shadow-sm">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] font-bold tracking-wider"><tr><th class="px-6 py-4">Proposição</th><th class="px-6 py-4">Ano</th><th class="px-6 py-4">Ementa</th><th class="px-6 py-4 text-center">Monitorar</th><th class="px-6 py-4">Ação</th></tr></thead>
              <tbody id="projects-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
            </table>
          </div>
        </section>

        <section id="view-agenda" class="view-section space-y-4">
          <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm grid grid-cols-1 md:grid-cols-4 gap-3">
            <select id="agenda-type" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"><option value="todos">Todos tipos</option><option value="comissao">Comissões</option><option value="plenario">Plenário</option></select>
            <input id="agenda-date" type="date" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
            <input id="agenda-search" type="search" placeholder="Buscar tema/órgão" class="md:col-span-2 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
          </div>
          <div id="agenda-list" class="space-y-4"></div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = 'https://dadosabertos.camara.leg.br/api/v2';
    const STORAGE_KEY_PROJS = 'camara360_tracked_projects';

    const state = {
      currentView: 'dashboard',
      data: { deputados: [], partidos: [], orgaos: [], proposicoes: [], eventos: [] },
      trackedProjects: [],
      chart: null,
      timer: null,
    };

    function say(message){ document.getElementById('announcer').textContent = message; }

    function initTracking(){
      try { state.trackedProjects = JSON.parse(localStorage.getItem(STORAGE_KEY_PROJS) || '[]'); }
      catch { state.trackedProjects = []; }
    }

    function isTracked(id){ return state.trackedProjects.some(p => p.id === id); }

    function toggleTrackProject(proj){
      const i = state.trackedProjects.findIndex(p => p.id === proj.id);
      if (i > -1) state.trackedProjects.splice(i,1); else state.trackedProjects.unshift(proj);
      localStorage.setItem(STORAGE_KEY_PROJS, JSON.stringify(state.trackedProjects));
      renderProjects();
      say(i > -1 ? 'Projeto removido do monitoramento.' : 'Projeto adicionado ao monitoramento.');
    }

    function switchView(viewId){
      state.currentView = viewId;
      document.querySelectorAll('.view-section').forEach(s => s.classList.toggle('active', s.id === `view-${viewId}`));
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active-link', btn.dataset.view === viewId));
      const titles = { dashboard:'Visão Geral', live:'Monitor Digital Ao Vivo', deputies:'Deputados Ativos', committees:'Comissões e Órgãos', projects:'Controle Legislativo', agenda:'Próximos Eventos' };
      document.getElementById('view-title').innerText = titles[viewId] || 'Câmara 360';
      renderViewData();
      lucide.createIcons();
      say(`Visualização alterada para ${titles[viewId]}.`);
    }

    async function fetchApi(endpoint, params = {}){
      const url = new URL(`${API_BASE}${endpoint}`);
      Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      const res = await fetch(url);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function fallbackData(){
      const now = new Date();
      return {
        deputados:[{id:1,nome:'Dep. Exemplo',siglaPartido:'PL',siglaUf:'AP',siglaSexo:'M',urlFoto:'https://www.camara.leg.br/internet/deputado/bandep/160565.jpg'}],
        partidos:[],
        orgaos:[{id:1,apelido:'CCJC',nome:'Comissão de Constituição e Justiça',tipoOrgao:'Comissão Permanente'}],
        proposicoes:[{id:999,siglaTipo:'PL',numero:123,ano:2026,ementa:'Proposição de demonstração',uri:'https://www.camara.leg.br/'}],
        eventos:[{dataHoraInicio:now.toISOString(),descricaoTipo:'Sessão Deliberativa',descricao:'Evento de fallback',orgao:{apelido:'PLEN'},situacao:'Prevista'}]
      }
    }

    async function loadDashboard(){
      document.getElementById('api-status-text').innerText = 'Sincronizando...';
      try {
        const [deps, parts, orgs, props, events] = await Promise.all([
          fetchApi('/deputados', { itens: 600, ordem:'ASC', ordenarPor:'nome' }),
          fetchApi('/partidos', { itens: 80 }),
          fetchApi('/orgaos', { itens: 300, ordem:'ASC', ordenarPor:'apelido' }),
          fetchApi('/proposicoes', { siglaTipo:'PL', itens:50, ordem:'DESC', ordenarPor:'id' }),
          fetchApi('/eventos', { dataInicio:new Date(Date.now()-24*3600*1000).toISOString().slice(0,10), dataFim:new Date(Date.now()+7*24*3600*1000).toISOString().slice(0,10), itens:100, ordem:'ASC', ordenarPor:'dataHoraInicio' })
        ]);
        state.data = { deputados: deps.dados || [], partidos: parts.dados || [], orgaos: orgs.dados || [], proposicoes: props.dados || [], eventos: events.dados || [] };
        document.getElementById('api-status-dot').className = 'w-2 h-2 rounded-full bg-green-500';
        document.getElementById('api-status-text').innerText = 'Online';
      } catch (err){
        state.data = fallbackData();
        document.getElementById('api-status-dot').className = 'w-2 h-2 rounded-full bg-amber-500';
        document.getElementById('api-status-text').innerText = `Fallback: ${err.message}`;
      }

      document.getElementById('last-update').innerText = new Date().toLocaleTimeString('pt-BR');
      populateFilters();
      renderViewData();
      lucide.createIcons();
    }

    function populateFilters(){
      const party = document.getElementById('deputy-party-filter');
      const uf = document.getElementById('deputy-uf-filter');
      const projectYear = document.getElementById('project-year-filter');
      const type = document.getElementById('committee-type-filter');

      const parties = [...new Set(state.data.deputados.map(d=>d.siglaPartido).filter(Boolean))].sort();
      party.innerHTML = '<option value="">Todos</option>' + parties.map(v=>`<option value="${v}">${v}</option>`).join('');

      const ufs = [...new Set(state.data.deputados.map(d=>d.siglaUf).filter(Boolean))].sort();
      uf.innerHTML = '<option value="">Todas</option>' + ufs.map(v=>`<option value="${v}">${v}</option>`).join('');

      const years = [...new Set(state.data.proposicoes.map(p=>p.ano).filter(Boolean))].sort((a,b)=>b-a);
      projectYear.innerHTML = '<option value="">Todos os anos</option>' + years.map(v=>`<option value="${v}">${v}</option>`).join('');

      const types = [...new Set(state.data.orgaos.map(o=>o.tipoOrgao).filter(Boolean))].sort();
      type.innerHTML = '<option value="">Todos os tipos</option>' + types.map(v=>`<option value="${v}">${v}</option>`).join('');
    }

    function renderViewData(){
      ({dashboard:renderDashboard, live:renderLiveMonitor, deputies:renderDeputies, committees:renderCommittees, projects:renderProjects, agenda:renderAgenda}[state.currentView] || renderDashboard)();
    }

    function renderDashboard(){
      const kpis = [
        {label:'Deputados', val:state.data.deputados.length, icon:'users', color:'text-blue-600'},
        {label:'Partidos', val:new Set(state.data.deputados.map(d=>d.siglaPartido)).size, icon:'flag', color:'text-emerald-600'},
        {label:'Eventos 48h', val:state.data.eventos.length, icon:'calendar', color:'text-orange-600'},
        {label:'Projetos', val:state.data.proposicoes.length, icon:'file-text', color:'text-purple-600'},
      ];
      document.getElementById('kpis-container').innerHTML = kpis.map(k=>`<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm"><div class="flex justify-between"><div><p class="text-slate-500 text-[10px] font-bold uppercase">${k.label}</p><h3 class="text-3xl font-bold text-slate-800 mt-1">${k.val||'--'}</h3></div><div class="p-2 bg-slate-50 rounded-lg ${k.color}"><i data-lucide="${k.icon}" class="w-5 h-5"></i></div></div></div>`).join('');

      const counts = {};
      state.data.deputados.forEach(d => counts[d.siglaPartido] = (counts[d.siglaPartido] || 0) + 1);
      const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const ctx = document.getElementById('partyChart').getContext('2d');
      if (state.chart) state.chart.destroy();
      state.chart = new Chart(ctx,{type:'bar',data:{labels:sorted.map(i=>i[0]),datasets:[{data:sorted.map(i=>i[1]),backgroundColor:'#1d4ed8',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});

      const comm = {};
      state.data.eventos.forEach(e=>{const k=e.orgao?.apelido||'Órgão'; comm[k]=(comm[k]||0)+1;});
      const top = Object.entries(comm).sort((a,b)=>b[1]-a[1]).slice(0,6);
      document.getElementById('active-committees').innerHTML = top.length ? top.map(([n,c])=>`<div class="flex justify-between p-3 bg-slate-50 rounded-xl"><span class="font-semibold text-xs text-slate-700">${n}</span><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-bold">${c}</span></div>`).join('') : '<p class="text-slate-400 text-xs">Sem eventos.</p>';
    }

    function renderLiveMonitor(){
      const now = new Date();
      const live = state.data.eventos.filter(e => {
        const date = new Date(e.dataHoraInicio);
        const st = (e.situacao||'').toLowerCase();
        return date.toDateString() === now.toDateString() && (st.includes('andamento') || st.includes('prevista') || st.includes('confirmada'));
      });
      const grid = document.getElementById('live-grid');
      grid.innerHTML = live.length ? live.slice(0,9).map(e=>`<div class="bg-white p-2 rounded-2xl border border-slate-200 shadow-lg"><div class="video-monitor flex items-center justify-center"><div class="text-slate-700/60"><i data-lucide="play-circle" class="w-16 h-16"></i></div><div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/80 to-transparent text-white"><p class="text-[10px] font-bold uppercase text-blue-300">${e.descricaoTipo||'Evento'}</p><h4 class="text-sm font-bold truncate">${e.descricao||'Sessão Legislativa'}</h4></div></div><div class="p-3 flex justify-between"><div class="text-[11px] text-slate-500">${new Date(e.dataHoraInicio).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div><button class="bg-slate-900 text-white px-3 py-1 rounded-lg text-xs font-bold" data-action="open-stream">Assistir</button></div></div>`).join('') : '<div class="col-span-full p-20 text-center text-slate-400">Nenhuma sessão ativa no momento.</div>';
    }

    function renderDeputies(){
      const search = document.getElementById('deputy-search').value.toLowerCase();
      const party = document.getElementById('deputy-party-filter').value;
      const uf = document.getElementById('deputy-uf-filter').value;
      const sex = document.getElementById('deputy-sex-filter').value;
      const filtered = state.data.deputados.filter(d => (d.nome||'').toLowerCase().includes(search) && (!party || d.siglaPartido===party) && (!uf || d.siglaUf===uf) && (!sex || d.siglaSexo===sex));
      document.getElementById('deputies-grid').innerHTML = filtered.slice(0,48).map(d=>`<article class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4 hover:border-blue-500"><img src="${d.urlFoto||''}" alt="Deputado ${d.nome||''}" class="w-14 h-14 rounded-full object-cover bg-slate-100" /><div><h4 class="font-bold text-slate-800 text-sm leading-tight">${d.nome||''}</h4><span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded">${d.siglaPartido||''} · ${d.siglaUf||''}</span></div></article>`).join('');
    }

    function renderCommittees(){
      const search = document.getElementById('committee-search').value.toLowerCase();
      const type = document.getElementById('committee-type-filter').value;
      const filtered = state.data.orgaos.filter(o => ((o.nome||'').toLowerCase().includes(search) || (o.apelido||'').toLowerCase().includes(search)) && (!type || o.tipoOrgao===type));
      document.getElementById('committees-list').innerHTML = filtered.slice(0,60).map(o=>`<div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><div class="flex justify-between items-start mb-3"><div class="p-2 bg-blue-50 text-blue-700 rounded-lg"><i data-lucide="landmark" class="w-5 h-5"></i></div><span class="text-[9px] font-bold uppercase px-2 py-1 bg-slate-100 text-slate-500 rounded-full">${o.tipoOrgao||'Órgão'}</span></div><h4 class="font-bold text-slate-800">${o.apelido||''}</h4><p class="text-[11px] text-slate-500 mt-1">${o.nome||''}</p><div class="mt-4 pt-4 border-t border-slate-100"><button class="text-blue-600 font-bold text-[10px] uppercase" data-action="open-orgao" data-id="${o.id||''}">Página Oficial</button></div></div>`).join('');
      lucide.createIcons();
    }

    function renderProjects(){
      const search = document.getElementById('project-search').value.toLowerCase();
      const year = document.getElementById('project-year-filter').value;
      const filtered = state.data.proposicoes.filter(p => (`${p.siglaTipo} ${p.numero} ${p.ementa||''}`.toLowerCase().includes(search) && (!year || String(p.ano)===year)));

      const sec = document.getElementById('tracked-projects-section');
      const grid = document.getElementById('tracked-projects-grid');
      if (state.trackedProjects.length) {
        sec.classList.remove('hidden');
        grid.innerHTML = state.trackedProjects.map(p => `<div class="bg-blue-50 p-4 rounded-xl border border-blue-200 flex justify-between items-center"><div class="flex-1"><span class="text-[10px] font-bold text-blue-700 uppercase">${p.siglaTipo} ${p.numero}/${p.ano}</span><p class="text-xs text-slate-700 line-clamp-1">${p.ementa||''}</p></div><div class="flex gap-2 ml-3"><button data-action="untrack" data-id="${p.id}" class="text-slate-500 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button><button data-action="open-prop" data-uri="${p.uri||''}" class="bg-blue-600 text-white p-1.5 rounded-lg"><i data-lucide="external-link" class="w-3 h-3"></i></button></div></div>`).join('');
      } else {
        sec.classList.add('hidden');
      }

      document.getElementById('projects-table-body').innerHTML = filtered.map(p => `
        <tr class="hover:bg-slate-50"><td class="px-6 py-4 font-bold text-blue-700 whitespace-nowrap">${p.siglaTipo} ${p.numero}/${p.ano}</td><td class="px-6 py-4">${p.ano}</td><td class="px-6 py-4 max-w-sm"><p class="line-clamp-2 text-slate-600">${p.ementa||''}</p></td><td class="px-6 py-4 text-center"><button data-action="track" data-id="${p.id}" class="p-2"><i data-lucide="star" class="w-5 h-5 ${isTracked(p.id)?'star-active':'text-slate-300'}"></i></button></td><td class="px-6 py-4"><button data-action="open-prop" data-uri="${p.uri||''}" class="text-blue-600 font-bold text-[10px] uppercase">Ver</button></td></tr>
      `).join('');
      lucide.createIcons();
    }

    function normalizeEventType(e){
      const txt = `${e.descricaoTipo||''} ${e.descricao||''}`.toLowerCase();
      return txt.includes('plen') || txt.includes('sessão') ? 'plenario' : 'comissao';
    }

    function renderAgenda(){
      const type = document.getElementById('agenda-type').value;
      const date = document.getElementById('agenda-date').value;
      const q = document.getElementById('agenda-search').value.toLowerCase();
      const filtered = state.data.eventos.filter(e => {
        if (type !== 'todos' && normalizeEventType(e) !== type) return false;
        if (date && new Date(e.dataHoraInicio).toISOString().slice(0,10) !== date) return false;
        const txt = `${e.descricaoTipo||''} ${e.descricao||''} ${e.orgao?.apelido||''}`.toLowerCase();
        return txt.includes(q);
      });
      document.getElementById('agenda-list').innerHTML = filtered.map(e => `<div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex gap-4"><div class="min-w-[80px] text-center border-r pr-4 border-slate-100"><div class="text-[10px] font-bold text-blue-700 uppercase">${new Date(e.dataHoraInicio).toLocaleDateString('pt-BR')}</div><div class="text-lg font-bold text-slate-800">${new Date(e.dataHoraInicio).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div></div><div class="flex-1"><span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[9px] font-bold uppercase mb-1 inline-block">${e.descricaoTipo||''}</span><h4 class="font-bold text-sm text-slate-800">${e.orgao?.apelido||''}</h4><p class="text-xs text-slate-500">${e.descricao||'Sem pauta definida.'}</p></div></div>`).join('') || '<p class="text-center p-10 text-slate-400">Nenhum evento encontrado.</p>';
    }

    document.getElementById('leftNav').addEventListener('click', (e) => {
      const btn = e.target.closest('.nav-btn[data-view]');
      if (btn) switchView(btn.dataset.view);
    });

    document.body.addEventListener('click', (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      const action = t.dataset.action;
      if (action === 'open-stream') window.open('https://www.youtube.com/@camaradosdeputadosoficial/streams', '_blank');
      if (action === 'open-orgao') window.open(`https://www.camara.leg.br/comissoes/${t.dataset.id || ''}`, '_blank');
      if (action === 'open-prop') window.open(t.dataset.uri || 'https://www.camara.leg.br/', '_blank');
      if (action === 'track') {
        const id = Number(t.dataset.id);
        const p = state.data.proposicoes.find(x => x.id === id);
        if (p) toggleTrackProject(p);
      }
      if (action === 'untrack') {
        const id = Number(t.dataset.id);
        state.trackedProjects = state.trackedProjects.filter(p => p.id !== id);
        localStorage.setItem(STORAGE_KEY_PROJS, JSON.stringify(state.trackedProjects));
        renderProjects();
      }
    });

    ['project-search','project-year-filter'].forEach(id=>document.getElementById(id).addEventListener(id.includes('search')?'input':'change', renderProjects));
    ['deputy-search','deputy-party-filter','deputy-uf-filter','deputy-sex-filter'].forEach(id=>document.getElementById(id).addEventListener(id==='deputy-search'?'input':'change', renderDeputies));
    ['committee-search','committee-type-filter'].forEach(id=>document.getElementById(id).addEventListener(id==='committee-search'?'input':'change', renderCommittees));
    ['agenda-type','agenda-date','agenda-search'].forEach(id=>document.getElementById(id).addEventListener(id==='agenda-search'?'input':'change', renderAgenda));

    document.getElementById('refresh-btn').addEventListener('click', loadDashboard);
    document.getElementById('refresh-interval').addEventListener('change', (e) => {
      const val = Number(e.target.value);
      if (state.timer) clearInterval(state.timer);
      if (val > 0) state.timer = setInterval(loadDashboard, val * 1000);
    });

    window.onload = () => {
      initTracking();
      loadDashboard();
      lucide.createIcons();
      state.timer = setInterval(loadDashboard, 60000);
    };
  </script>
</body>
</html>
